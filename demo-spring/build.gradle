
dependencies {

    //aspectj 为aop 提供依赖
    implementation group: 'org.aspectj', name: 'aspectjweaver', version: project['aspectj.version']

    //spring boot web
    implementation group: 'org.springframework.boot', name: 'spring-boot-starter-web', version: project['spring-boot.version']

    //spring retry
    implementation group: 'org.springframework.retry', name: 'spring-retry', version: project['spring-retry.version']

    //jcache
    implementation group: 'javax.cache', name: 'cache-api',version: project['jcache.version']
    //ehcache
    implementation group: 'org.ehcache', name: 'ehcache', version: project['ehcache3.version']

    //
    implementation group: 'net.sf.ehcache', name: 'ehcache', version: project['ehcache.version']

    //spring boot cache
    implementation group: 'org.springframework.boot', name: 'spring-boot-starter-cache', version: project['spring-boot.version']

    //spring boot test
    testCompile group: 'org.springframework.boot', name: 'spring-boot-starter-test', version: project['spring-boot.version']

    implementation group: 'org.springframework.boot', name: 'spring-boot-starter-websocket', version: project['spring-boot.version']

    implementation group: 'org.springframework.boot', name: 'spring-boot-starter-thymeleaf', version: project['spring-boot.version']
    //处理配置元数据
    compileOnly group: 'org.springframework.boot', name: 'spring-boot-configuration-processor', version: project['spring-boot.version']
    compileJava.dependsOn(processResources)
   // implementation group: 'org.springframework.session', name: 'spring-session', version: project['spring-session.version'

}