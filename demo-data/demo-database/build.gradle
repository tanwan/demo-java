//plugins已经在settings.gradle配置了版本
plugins {
    //see https://flywaydb.org/documentation/usage/gradle/
    id 'org.flywaydb.flyway'
}
dependencies {
    //aspectj 为aop 提供依赖
    implementation group: 'org.aspectj', name: 'aspectjweaver', version: project['aspectj.version']

    implementation group: 'org.flywaydb', name: 'flyway-core', version: project['flyway.version']

    //hibernate
    implementation group: 'org.hibernate', name: 'hibernate-entitymanager', version: project['hibernate.version']

    // hikari
    implementation group: 'com.zaxxer', name: 'HikariCP', version: project['HikariCP.version']

    //ehcache2
    implementation group: 'org.hibernate', name: 'hibernate-ehcache', version: project['hibernate.version']

    //ehcache3
    implementation group: 'org.hibernate', name: 'hibernate-jcache', version: project['hibernate.version']
    implementation group: 'org.ehcache', name: 'ehcache', version: project['ehcache3.version']

    // freemarker
    implementation group: 'org.freemarker', name: 'freemarker', version: project['freemarker.version']

    implementation group: 'org.springframework.boot', name: 'spring-boot-starter-jooq', version: project['spring-boot.version']

    //mysql驱动
    implementation group: 'mysql', name: 'mysql-connector-java', version: project['mysql.version']

    //mybatis plus
    implementation group: 'com.baomidou', name: 'mybatis-plus-boot-starter', version: project['mybatis-plus-boot.version']
    implementation group: 'com.baomidou', name:'mybatis-plus-generator',version: project['mybatis-plus-boot.version']

    //spring data jpa
    implementation group: 'org.springframework.boot', name: 'spring-boot-starter-data-jpa', version: project['spring-boot.version']

    //spring boot test
    testImplementation group: 'org.springframework.boot', name: 'spring-boot-starter-test', version: project['spring-boot.version']

    //spring boot web
    implementation group: 'org.springframework.boot', name: 'spring-boot-starter-web', version: project['spring-boot.version']

    //druid(阿里巴巴数据库连接池)
    implementation group: 'com.alibaba', name: 'druid-spring-boot-starter', version: project['druid.springboot.version']

    //sql监控
    implementation group: 'p6spy', name: 'p6spy', version: project['p6spy.version']

    //sharding-jdbc
    implementation(group: 'org.apache.shardingsphere', name: 'sharding-jdbc-core', version: project['sharding-jdbc.version']){
        exclude group: 'org.yaml', module: 'snakeyaml'
    }
    implementation(group: 'org.apache.shardingsphere', name: 'sharding-jdbc-spring-boot-starter', version: project['sharding-jdbc.version']){
        exclude group: 'org.yaml', module: 'snakeyaml'
    }
}

//因为locations使用了classpath,所以需要依赖classes
flywayMigrate.dependsOn classes
flyway {
    url = 'jdbc:mysql://127.0.0.1:3306/demo'
    user = 'root'
    password = '123456'
    locations = ['classpath:flyway/migration']
}
